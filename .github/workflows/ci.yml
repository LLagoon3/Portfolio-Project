name: CI

on:
  push:
    branches:
      - main
      - dev
  pull_request:

jobs:
  web-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  api-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run api:lint

      - name: Build
        run: npm run api:build

      - name: Test
        run: npm test -w apps/api

  docker-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        image: [web, api]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # fork PR 에서는 GITHUB_TOKEN 이 read-only 라 push 가 불가하다. push 이벤트일 때만 로그인한다.
      - name: Log in to GHCR
        if: ${{ github.event_name == 'push' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/llagoon3/portfolio-${{ matrix.image }}
          # 불변 SHA 태그(롤백용) + push 시 브랜치 latest 알리아스
          tags: |
            type=sha,prefix=${{ github.ref_name }}-,format=short
            type=raw,value=${{ github.ref_name }}-latest,enable=${{ github.event_name == 'push' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/${{ matrix.image }}/Dockerfile
          # PR 트리거는 빌드 검증만, push(main/dev) 만 GHCR 푸시
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,scope=${{ matrix.image }},mode=max
          # Next.js rewrites 가 build 시점에 평가되므로 web 이미지에 baked 된다. prod/dev 모두 동일 값.
          build-args: |
            API_INTERNAL_URL=http://api:7341
