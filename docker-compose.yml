services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "${API_PORT:-3001}:3001"
    environment:
      NODE_ENV: production
      PORT: "3001"
      CORS_ORIGIN: "${CORS_ORIGIN:-}"
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_USERNAME: "${DB_USERNAME:-portfolio}"
      DB_PASSWORD: "${DB_PASSWORD:-portfolio_secret}"
      DB_DATABASE: "${DB_DATABASE:-portfolio}"
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    ports:
      - "${DB_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: "${DB_ROOT_PASSWORD:-root_secret}"
      MYSQL_DATABASE: "${DB_DATABASE:-portfolio}"
      MYSQL_USER: "${DB_USERNAME:-portfolio}"
      MYSQL_PASSWORD: "${DB_PASSWORD:-portfolio_secret}"
      TZ: Asia/Seoul
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

volumes:
  mysql_data:
